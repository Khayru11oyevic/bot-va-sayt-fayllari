<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0A0A0A; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-6">
    <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">Premium Zone 👑</h1>
    <p class="text-gray-400 text-sm">Fast • Secure • Instant</p>

    <div class="grid grid-cols-2 gap-4 mt-6">
        <div class="glass p-4 rounded-3xl">
            <h3 class="font-bold">Premium</h3>
            <p class="text-blue-400">42 000 UZS</p>
        </div>
        <div class="glass p-4 rounded-3xl">
            <h3 class="font-bold">Stars</h3>
            <p class="text-blue-400">27 000 UZS</p>
        </div>
    </div>
</body>
</html>
