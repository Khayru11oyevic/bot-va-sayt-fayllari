<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Zone Do'koni</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
        }
    </style>
</head>
<body class="p-4 font-sans selection:bg-blue-500 selection:text-white">

    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-500">💎 Premium Zone</h1>
        <p class="text-sm opacity-70 mt-1">Telegram Premium va Stars xizmatlari</p>
    </div>

    <div class="space-y-4">
        
        <div class="p-4 rounded-xl border border-gray-200 shadow-sm bg-opacity-10 bg-blue-500 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg text-blue-600">Telegram Premium (3 Oylik)</h3>
                <p class="text-sm font-semibold mt-1 text-green-600">120,000 so'm</p>
            </div>
            <button onclick="buyProduct('Telegram Premium (3 oylik)', '120,000')" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                Sotib olish
            </button>
        </div>

        <div class="p-4 rounded-xl border border-gray-200 shadow-sm bg-opacity-10 bg-blue-500 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg text-blue-600">Telegram Premium (6 Oylik)</h3>
                <p class="text-sm font-semibold mt-1 text-green-600">200,000 so'm</p>
            </div>
            <button onclick="buyProduct('Telegram Premium (6 oylik)', '200,000')" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                Sotib olish
            </button>
        </div>

        <div class="p-4 rounded-xl border border-gray-200 shadow-sm bg-opacity-10 bg-yellow-500 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg text-yellow-600">⭐ 100 Telegram Stars</h3>
                <p class="text-sm font-semibold mt-1 text-green-600">28,000 so'm</p>
            </div>
            <button onclick="buyProduct('100 Telegram Stars', '28,000')" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                Sotib olish
            </button>
        </div>

        <div class="p-4 rounded-xl border border-gray-200 shadow-sm bg-opacity-10 bg-yellow-500 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg text-yellow-600">⭐ 500 Telegram Stars</h3>
                <p class="text-sm font-semibold mt-1 text-green-600">125,000 so'm</p>
            </div>
            <button onclick="buyProduct('500 Telegram Stars', '125,000')" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                Sotib olish
            </button>
        </div>

    </div>

    <script>
        // Telegram WebApp obyektini kengaytirish
        const tg = window.Telegram.WebApp;
        tg.expand(); // Ilovani toliq ekranda ochish

        function buyProduct(name, price) {
            // Tanlangan mahsulot haqida ma'lumot tayyorlaymiz
            const data = {
                product_name: name,
                product_price: price
            };
            
            // Ma'lumotni Telegram botga yuboramiz va ilovani yopamiz
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
