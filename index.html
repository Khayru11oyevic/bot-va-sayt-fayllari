<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0A0A0A; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .card:hover { transform: scale(1.02); transition: 0.3s; }
        .gradient-text { background: linear-gradient(90deg, #3B82F6, #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen p-4">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-0 left-0 w-96 h-96 bg-blue-600/20 rounded-full blur-[150px]"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-600/20 rounded-full blur-[150px]"></div>
    </div>

    <header class="mt-6 mb-8 text-center">
        <h1 class="text-4xl font-bold gradient-text">Premium Zone 👑</h1>
        <p class="text-gray-400 mt-2 tracking-widest uppercase text-[10px]">Fast • Secure • Instant</p>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="card glass p-5 rounded-[24px] relative overflow-hidden">
            <span class="absolute top-2 right-2 text-[8px] bg-blue-600 px-2 py-1 rounded-full">Top Sale</span>
            <div class="text-2xl mb-2">🚀</div>
            <h3 class="font-bold text-sm">Premium 1m</h3>
            <p class="text-blue-400 font-bold text-xs mt-1">42 000 UZS</p>
        </div>
        <div class="card glass p-5 rounded-[24px] relative overflow-hidden">
            <span class="absolute top-2 right-2 text-[8px] bg-purple-600 px-2 py-1 rounded-full">Popular</span>
            <div class="text-2xl mb-2">⭐</div>
            <h3 class="font-bold text-sm">Stars</h3>
            <p class="text-purple-400 font-bold text-xs mt-1">27 000 UZS</p>
        </div>
    </div>

    <div class="space-y-4">
        <div class="glass p-4 rounded-[20px] flex justify-between items-center hover:border-blue-500/50 cursor-pointer">
            <span class="flex items-center gap-3 font-medium text-sm">🛡️ Account Login</span>
            <span class="text-gray-500">→</span>
        </div>
        <div class="glass p-4 rounded-[20px] flex justify-between items-center hover:border-blue-500/50 cursor-pointer">
            <span class="flex items-center gap-3 font-medium text-sm">🎁 Gift Link</span>
            <span class="text-gray-500">→</span>
        </div>
        <div class="glass p-4 rounded-[20px] flex justify-between items-center hover:border-blue-500/50 cursor-pointer">
            <span class="flex items-center gap-3 font-medium text-sm">⭐ Telegram Stars</span>
            <span class="text-gray-500">→</span>
        </div>
    </div>

    <div class="fixed bottom-6 left-4 right-4 glass rounded-[30px] p-4 flex justify-around">
        <div class="text-blue-500 text-xs text-center">🏠<br>Home</div>
        <div class="text-gray-500 text-xs text-center">📋<br>Orders</div>
        <div class="text-gray-500 text-xs text-center">🎧<br>Support</div>
    </div>

</body>
</html>
